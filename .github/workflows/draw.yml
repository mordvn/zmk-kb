name: Draw Keymap

on: [push, pull_request, workflow_dispatch]

jobs:
  draw:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install keymap-drawer
        run: python -m pip install --upgrade pip keymap-drawer

      - name: Generate keymap
        run: |
          mkdir -p keymaps
          python -m keymap_drawer draw \
            -o keymaps/keymap.svg \
            config/corne.keymap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymap-svg
          path: keymaps/keymap.svg
