name: Draw Keymap

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "config/**"
      - "boards/shields/**"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Generate keymap
        run: |
          mkdir -p keymaps
          keymap-drawer draw \
            -o keymaps/keymap.svg \
            config/keymap.keymap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymap-svg
          path: keymaps/keymap.svg
